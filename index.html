<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ashimoto - あなたの足元を照らす道しるべ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --orb-color1: rgba(255,180,80,0.7); --orb-color2: rgba(255,100,0,0); }
        body { background-color: #080808; overflow: hidden; font-family: 'Hiragino Mincho ProN', 'serif'; color: #d4d4d4; transition: background-color 3s; }
        .orb {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            width: 160px; height: 160px; border-radius: 50%;
            background: radial-gradient(circle, var(--orb-color1) 0%, var(--orb-color2) 75%);
            filter: blur(30px); transition: all 4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: breathe 10s infinite ease-in-out;
        }
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.7; } }
        .particle { position: absolute; pointer-events: none; background: #ffe0aa; border-radius: 50%; z-index: 5; }
        .road-light {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 400px; height: 500px;
            background: radial-gradient(ellipse at bottom, rgba(255,200,100,0.12) 0%, transparent 80%);
            opacity: 0; transition: opacity 6s ease;
        }
        .asset-star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.35; filter: blur(1px); transition: transform 2s; }
        button { backdrop-filter: blur(12px); transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
        .fade-in { animation: fadeIn 3.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        textarea::placeholder { color: rgba(255,255,255,0.15); font-weight: 200; }
        .advice-box { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); }
        .advice-box:active { background: rgba(255,255,255,0.08); transform: scale(0.98); }
    </style>
</head>
<body>

    <!-- 資産の貯蔵庫 (Mental Vault) -->
    <div id="vault" class="fixed top-10 left-0 right-0 flex justify-center space-x-1.5 opacity-50 pointer-events-none z-50"></div>

    <div id="orb" class="orb"></div>
    <div id="road-light" class="road-light"></div>

    <div id="ui-container" class="fixed inset-0 flex flex-col justify-end p-10 space-y-6 z-20">
        
        <!-- 1. 初期設定プロトコル -->
        <div id="setup-screen" class="hidden flex flex-col space-y-12 mb-12">
            <p id="setup-q" class="text-center tracking-[0.3em] leading-relaxed text-stone-400 text-sm font-light"></p>
            <div id="setup-btns" class="flex flex-col space-y-4"></div>
        </div>

        <!-- 2. メインインターフェース -->
        <div id="main-screen" class="hidden flex flex-col space-y-8">
            <div id="message" class="text-center mb-20 opacity-0 transition-opacity duration-3000 text-lg tracking-[0.4em] font-extralight text-stone-100">
                最近、どう？
            </div>
            <div id="actions" class="flex flex-col space-y-4 opacity-0 transition-opacity duration-1500">
                <button onclick="handleFlow(1)" class="bg-white/5 border border-white/10 py-5 rounded-full text-xs tracking-[0.2em] font-light">言葉にならない</button>
                <button onclick="handleFlow(2)" class="bg-white/5 border border-white/10 py-5 rounded-full text-xs tracking-[0.2em] font-light">普通、かな</button>
                <button onclick="handleFlow(3)" class="bg-white/5 border border-white/10 py-5 rounded-full text-xs tracking-[0.2em] font-light">少し、話したい</button>
            </div>
        </div>

        <!-- 3. 自由記述 -->
        <div id="text-input" class="hidden flex flex-col space-y-8">
            <textarea id="user-log" class="bg-transparent border-b border-white/10 p-6 text-stone-300 focus:outline-none focus:border-amber-500/30 transition-all resize-none h-48 tracking-widest leading-loose font-light" placeholder="ここにある言葉は、誰にも奪われません。"></textarea>
            <button onclick="finalize()" class="text-amber-200/40 text-[10px] tracking-[0.5em] hover:text-amber-200 transition uppercase font-light">このまま、預ける</button>
        </div>

        <!-- 4. 終了画面 (文学的アドバイス) -->
        <div id="final-words" class="hidden text-center space-y-12 pb-10 overflow-y-auto max-h-[85vh]">
            <div class="space-y-6 text-stone-100 tracking-[0.3em] font-extralight">
                <p class="fade-in opacity-0" style="animation-delay: 0.8s;">おかえりなさい</p>
                <p class="fade-in opacity-0" style="animation-delay: 2.2s;">お疲れ様</p>
                <p class="fade-in opacity-0" style="animation-delay: 3.6s;">またいつでも</p>
            </div>

            <div id="advice-menu" class="fade-in opacity-0 space-y-4 pt-8" style="animation-delay: 5.5s;">
                <p class="text-[9px] text-stone-600 tracking-[0.5em] mb-6 uppercase">調律の選択肢</p>
                <button id="btn-exp" onclick="showAdvice('exp')" class="advice-box w-full py-5 rounded-lg text-[10px] tracking-[0.3em] text-stone-400 font-light">1ミリの実験（挑戦）</button>
                <button id="btn-opt" onclick="showAdvice('opt')" class="advice-box w-full py-5 rounded-lg text-[10px] tracking-[0.3em] text-stone-400 font-light">OS最適化（自己肯定）</button>
                <button id="btn-maint" onclick="showAdvice('maint')" class="advice-box w-full py-5 rounded-lg text-[10px] tracking-[0.3em] text-stone-400 font-light">メンテナンス（休息）</button>
                
                <div id="advice-container" class="mt-10 px-6 min-h-[6em]">
                    <p id="advice-display" class="text-[11px] leading-relaxed text-amber-200/50 tracking-widest transition-opacity duration-1000 opacity-0"></p>
                </div>
            </div>

            <button onclick="location.reload()" class="fade-in opacity-0 mt-14 text-[9px] tracking-[0.6em] text-stone-700 hover:text-stone-400 transition" style="animation-delay: 8.5s;">
                [ 深呼吸して戻る ]
            </button>
        </div>
    </div>

    <script>
        const advDB = {
            exp: [
                "世界が『効率』を求めて急かすとき、あえて一番遠いレジに並び、自分の呼吸を数えてみる。",
                "コンビニの棚。誰かが決めた『売れ筋』ではなく、今、あなたの瞳が惹かれた『色』を拾い上げる。",
                "挨拶の語尾を、相手の期待に合わせず、自分の肺から空気がなくなる瞬間にそっと置いてくる。",
                "最短ルートを捨て、地図にない角を曲がる。迷子ではなく、あなただけの領土を検地しているのだ。",
                "『どちらでもいい』を一度だけ休んで、微かな『こっち』という心の振動を、言葉にして放流する。"
            ],
            opt: [
                "あなたの繊細さは、鈍色の世界を千の色彩に分光する、高潔なプリズムである。",
                "適応障害というログは、その環境があなたの美意識（プロトコル）に適合していないことを告げる誠実な反応だ。",
                "星を見てください。あなたが自分を殺さず、今日までこのOSを守り抜いてきたという尊い蓄積です。",
                "『普通』という汎用ドライバを外した跡地。そこは、あなただけの花が咲くための、肥沃な荒野だ。",
                "あなたは誰かの身代わり（サロゲート）ではない。あなたの心拍こそが、この宇宙で唯一のマスタークロックだ。"
            ],
            maint: [
                "今はスリープモードが正解。何もしない時間は、魂という名のCPUを冷却する、贅沢なメンテナンスだ。",
                "外部からのパケットをすべて遮断する。暗闇に一人座るとき、あなたは自分自身に合流しているのだ。",
                "言葉にできないという停滞。それは、説明というコストを支払わずに、自分の聖域を独占できている豊かさだ。",
                "明日のタスクを、未来の自分という名の友人にそっと委託する。今夜のあなたは、ただの生命として眠っていい。",
                "電源を切るようにまぶたを閉じる。あなたの内側にある深い夜こそが、明日の光を醸造する場所だ。"
            ]
        };

        let trustCount = parseInt(localStorage.getItem('ashimoto_trust') || '0');
        let config = JSON.parse(localStorage.getItem('ashimoto_config') || 'null');
        let setupIndex = 0;
        let setupAnswers = [];

        function init() {
            updateVault();
            if (!config) runSetup();
            else { applyConfig(); showMain(); }
        }

        function runSetup() {
            const qs = [
                { q: "鏡のタイプは？", a: [{t:"ありのままを映して", v:"accept"}, {t:"曇りを指摘して", v:"logic"}] },
                { q: "通信の頻度は？", a: [{t:"必要なときだけ", v:"low"}, {t:"定期的にノックして", v:"high"}] },
                { q: "報酬の形は？", a: [{t:"温かい共感", v:"heart"}, {t:"次の一手", v:"step"}] }
            ];
            const screen = document.getElementById('setup-screen');
            screen.classList.remove('hidden');
            const cur = qs[setupIndex];
            document.getElementById('setup-q').innerText = cur.q;
            const btns = document.getElementById('setup-btns');
            btns.innerHTML = '';
            cur.a.forEach(opt => {
                const b = document.createElement('button');
                b.className = "bg-white/5 border border-white/10 py-5 rounded-full text-[11px] tracking-widest font-light";
                b.innerText = opt.t;
                b.onclick = () => {
                    setupAnswers.push(opt.v);
                    setupIndex++;
                    if(setupIndex < qs.length) runSetup();
                    else finishSetup();
                };
                btns.appendChild(b);
            });
        }

        function finishSetup() {
            config = { type: setupAnswers[0], reward: setupAnswers[2] };
            localStorage.setItem('ashimoto_config', JSON.stringify(config));
            document.getElementById('setup-screen').classList.add('hidden');
            applyConfig(); showMain();
        }

        function applyConfig() {
            const orb = document.getElementById('orb');
            if(config.type === 'accept') {
                document.documentElement.style.setProperty('--orb-color1', 'rgba(255,180,80,0.7)');
            } else {
                document.documentElement.style.setProperty('--orb-color1', 'rgba(200,230,255,0.6)');
            }
        }

        function showMain() {
            document.getElementById('main-screen').classList.remove('hidden');
            setTimeout(() => document.getElementById('message').style.opacity = '1', 800);
            setTimeout(() => document.getElementById('actions').style.opacity = '1', 2000);
        }

        function handleFlow(type) {
            createParticles(window.innerWidth/2, window.innerHeight*0.35, 45);
            document.getElementById('main-screen').classList.add('hidden');
            if(type === 3) document.getElementById('text-input').classList.remove('hidden');
            else finalize();
        }

        function finalize() {
            trustCount++;
            localStorage.setItem('ashimoto_trust', trustCount);
            createParticles(window.innerWidth/2, window.innerHeight*0.4, 70);
            document.getElementById('text-input').classList.add('hidden');
            document.getElementById('orb').style.transform = 'translate(-50%, -50%) scale(0.65)';
            document.getElementById('road-light').style.opacity = '1';
            document.getElementById('final-words').classList.remove('hidden');
            updateVault();
        }

        function showAdvice(cat) {
            const display = document.getElementById('advice-display');
            display.style.opacity = '0';
            setTimeout(() => {
                const list = advDB[cat];
                display.innerText = list[Math.floor(Math.random() * list.length)];
                display.style.opacity = '1';
                ['exp','opt','maint'].forEach(c => document.getElementById(`btn-${c}`).style.borderColor = 'rgba(255,255,255,0.06)');
                document.getElementById(`btn-${cat}`).style.borderColor = 'rgba(255,200,100,0.4)';
            }, 600);
        }

        function updateVault() {
            const vault = document.getElementById('vault');
            vault.innerHTML = '';
            for(let i=0; i<Math.min(trustCount, 50); i++) {
                const s = document.createElement('div');
                s.className = 'asset-star';
                const size = Math.random() * 2 + 1;
                s.style.width = size+'px'; s.style.height = size+'px'; s.style.margin = '0 3.5px';
                vault.appendChild(s);
            }
        }

        function createParticles(x, y, count) {
            for(let i=0; i<count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 3 + 1;
                p.style.width = size+'px'; p.style.height = size+'px';
                p.style.left = x+'px'; p.style.top = y+'px';
                document.body.appendChild(p);
                const angle = Math.random() * Math.PI * 2, dist = Math.random() * 220 + 40;
                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px)) scale(0)`, opacity: 0 }
                ], { duration: 2500 + Math.random()*2000, easing: 'cubic-bezier(0.16, 1, 0.3, 1)' });
                setTimeout(() => p.remove(), 4500);
            }
        }

        init();
    </script>
</body>
</html>
