<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ashimoto - あなたのOSを調律する</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #080808; overflow: hidden; font-family: 'serif'; color: #d4d4d4; }
        .orb {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            width: 140px; height: 140px; border-radius: 50%;
            filter: blur(25px); transition: all 4s ease;
            animation: breathe 8s infinite ease-in-out;
        }
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.8; } }
        .road-light {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 300px; height: 400px;
            background: radial-gradient(ellipse at bottom, rgba(255,200,100,0.1) 0%, transparent 75%);
            opacity: 0; transition: opacity 5s ease;
        }
        .asset-star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.4; }
        .fade-in { animation: fadeIn 3s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="vault" class="fixed top-6 left-0 right-0 flex justify-center space-x-1 opacity-40 pointer-events-none"></div>
    <div id="orb" class="orb" style="background: radial-gradient(circle, rgba(255,180,80,0.7) 0%, rgba(255,100,0,0) 75%);"></div>
    <div id="road-light" class="road-light"></div>

    <div id="ui-container" class="fixed inset-0 flex flex-col justify-end p-10 space-y-6 z-20">
        <!-- 初期診断セクション -->
        <div id="setup-screen" class="hidden flex flex-col space-y-8 mb-10">
            <p id="setup-q" class="text-center tracking-widest leading-relaxed"></p>
            <div id="setup-btns" class="flex flex-col space-y-4"></div>
        </div>

        <!-- メインセクション -->
        <div id="main-screen" class="hidden flex flex-col space-y-6">
            <div id="message" class="text-center mb-16 opacity-0 transition-opacity duration-2000 text-lg tracking-[0.2em]">最近、どう？</div>
            <div id="actions" class="flex flex-col space-y-4 opacity-0 transition-opacity duration-1000">
                <button onclick="handleFlow(1)" class="bg-white/5 border border-white/10 py-5 rounded-full">言葉にならない</button>
                <button onclick="handleFlow(2)" class="bg-white/5 border border-white/10 py-5 rounded-full">普通、かな</button>
                <button onclick="handleFlow(3)" class="bg-white/5 border border-white/10 py-5 rounded-full">少し、話したい</button>
            </div>
        </div>

        <div id="text-input" class="hidden flex flex-col space-y-6">
            <textarea id="user-log" class="bg-transparent border-b border-white/20 p-4 text-stone-200 focus:outline-none h-32" placeholder="心の中を置くように。"></textarea>
            <button onclick="finalize()" class="text-amber-200/70 text-sm tracking-widest">このまま、預ける</button>
        </div>

        <div id="final-words" class="hidden text-center space-y-8 pb-10">
            <div class="space-y-4">
                <p class="fade-in opacity-0" style="animation-delay: 1s;">おかえりなさい</p>
                <p class="fade-in opacity-0" style="animation-delay: 2.5s;">お疲れ様</p>
                <p class="fade-in opacity-0" style="animation-delay: 4s;">またいつでも</p>
                <p id="os-advice" class="fade-in opacity-0 text-[11px] text-stone-500 pt-4" style="animation-delay: 5.5s;"></p>
            </div>
            <button onclick="location.reload()" class="fade-in opacity-0 mt-8 text-[10px] tracking-[0.3em] text-stone-600" style="animation-delay: 7s;">[ 戻る ]</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "鏡のタイプは？", a: [{t:"ありのままを映して", v:"accept"}, {t:"曇りを指摘して", v:"logic"}] },
            { q: "通信の頻度は？", a: [{t:"必要なときだけ", v:"low"}, {t:"定期的にノックして", v:"high"}] },
            { q: "報酬の形は？", a: [{t:"温かい共感", v:"heart"}, {t:"次の一手", v:"step"}] }
        ];
        let setupIndex = 0;
        let answers = [];

        function init() {
            const config = localStorage.getItem('ashimoto_config');
            if (!config) {
                showSetup();
            } else {
                applyConfig(JSON.parse(config));
                showMain();
            }
            updateVault();
        }

        function showSetup() {
            document.getElementById('setup-screen').classList.remove('hidden');
            const q = questions[setupIndex];
            document.getElementById('setup-q').innerText = q.q;
            const btns = document.getElementById('setup-btns');
            btns.innerHTML = '';
            q.a.forEach(opt => {
                const b = document.createElement('button');
                b.className = "bg-white/5 border border-white/10 py-5 rounded-full text-sm";
                b.innerText = opt.t;
                b.onclick = () => nextSetup(opt.v);
                btns.appendChild(b);
            });
        }

        function nextSetup(val) {
            answers.push(val);
            setupIndex++;
            if (setupIndex < questions.length) {
                showSetup();
            } else {
                const config = {
                    type: answers[0] === 'accept' ? 'warm' : 'cool',
                    pace: answers[1],
                    reward: answers[2]
                };
                localStorage.setItem('ashimoto_config', JSON.stringify(config));
                applyConfig(config);
                document.getElementById('setup-screen').classList.add('hidden');
                showMain();
            }
        }

        function applyConfig(config) {
            const orb = document.getElementById('orb');
            if(config.type === 'warm') {
                orb.style.background = "radial-gradient(circle, rgba(255,180,80,0.7) 0%, rgba(255,100,0,0) 75%)";
            } else {
                orb.style.background = "radial-gradient(circle, rgba(200,220,255,0.6) 0%, rgba(100,150,255,0) 75%)";
            }
            const advice = config.reward === 'heart' ? "あなたの感受性は、世界を彩る資産です。" : "小さなズレを、今日の収穫にしましょう。";
            document.getElementById('os-advice').innerText = advice;
        }

        function showMain() {
            document.getElementById('main-screen').classList.remove('hidden');
            setTimeout(() => document.getElementById('message').style.opacity = '1', 500);
            setTimeout(() => document.getElementById('actions').style.opacity = '1', 1500);
        }

        function handleFlow(type) {
            document.getElementById('main-screen').classList.add('hidden');
            if(type === 3) document.getElementById('text-input').classList.remove('hidden');
            else finalize();
        }

        function finalize() {
            let trust = parseInt(localStorage.getItem('ashimoto_trust') || '0') + 1;
            localStorage.setItem('ashimoto_trust', trust);
            document.getElementById('text-input').classList.add('hidden');
            document.getElementById('road-light').style.opacity = '1';
            document.getElementById('final-words').classList.remove('hidden');
            updateVault();
        }

        function updateVault() {
            const trust = parseInt(localStorage.getItem('ashimoto_trust') || '0');
            const vault = document.getElementById('vault');
            vault.innerHTML = '';
            for(let i=0; i<Math.min(trust, 50); i++) {
                const s = document.createElement('div');
                s.className = 'asset-star';
                s.style.width = '2px'; s.style.height = '2px'; s.style.margin = '0 2px';
                vault.appendChild(s);
            }
        }

        init();
    </script>
</body>
</html>
