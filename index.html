<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ashimoto - あなたの足元を照らす道しるべ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; }
        .orb {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,190,100,0.8) 0%, rgba(255,140,0,0) 70%);
            filter: blur(20px); transition: all 2s ease-in-out;
            animation: pulse 6s infinite alternate;
        }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; } 100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; } }
        .particle { position: absolute; pointer-events: none; background: #ffcc77; border-radius: 50%; opacity: 0; }
        .fade-in { animation: fadeIn 2s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .road-light {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 200px; height: 300px;
            background: radial-gradient(ellipse at bottom, rgba(255,200,100,0.2) 0%, transparent 80%);
            opacity: 0; transition: opacity 3s;
        }
    </style>
</head>
<body class="text-stone-300">

    <div id="orb" class="orb"></div>
    <div id="road-light" class="road-light"></div>

    <div id="ui-container" class="fixed inset-0 flex flex-col justify-end p-8 space-y-6 z-10">
        <div id="message" class="text-center mb-12 opacity-0 transition-opacity duration-1000 text-lg tracking-widest">
            最近、どう？
        </div>

        <div id="actions" class="grid grid-cols-1 gap-4 fade-in">
            <button onclick="handleFlow(1)" class="bg-stone-900/50 border border-stone-700 py-4 rounded-full hover:bg-stone-800 transition">
                言葉にならない
            </button>
            <button onclick="handleFlow(2)" class="bg-stone-900/50 border border-stone-700 py-4 rounded-full hover:bg-stone-800 transition">
                普通、かな
            </button>
            <button onclick="handleFlow(3)" class="bg-stone-900/50 border border-stone-700 py-4 rounded-full hover:bg-stone-800 transition">
                少し、話したい
            </button>
        </div>

        <div id="text-input" class="hidden flex flex-col space-y-4">
            <textarea id="user-log" class="bg-stone-900/80 border border-stone-700 p-4 rounded-xl text-stone-200 focus:outline-none" placeholder="ここには何を書いても大丈夫です。"></textarea>
            <button onclick="finalize()" class="bg-amber-700/50 py-3 rounded-full">このまま、預ける</button>
        </div>

        <div id="final-words" class="hidden text-center space-y-4 text-stone-100 py-10">
            <p class="fade-in" style="animation-delay: 1s;">おかえりなさい</p>
            <p class="fade-in" style="animation-delay: 2.5s;">お疲れ様</p>
            <p class="fade-in" style="animation-delay: 4s;">またいつでも</p>
        </div>
    </div>

    <script>
        function createParticles() {
            for(let i=0; i<30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 4 + 1;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = '50%';
                p.style.top = '40%';
                document.body.appendChild(p);
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 200 + 50;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;

                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
                ], { duration: 3000 + Math.random() * 2000, easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)' });
                
                setTimeout(() => p.remove(), 5000);
            }
        }

        window.onload = () => {
            setTimeout(() => document.getElementById('message').style.opacity = '1', 1000);
        };

        function handleFlow(type) {
            createParticles();
            document.getElementById('message').style.opacity = '0';
            document.getElementById('actions').classList.add('hidden');
            
            if(type === 3) {
                document.getElementById('text-input').classList.remove('hidden');
            } else {
                finalize();
            }
        }

        function finalize() {
            createParticles();
            document.getElementById('text-input').classList.add('hidden');
            document.getElementById('orb').style.transform = 'translate(-50%, -50%) scale(0.5)';
            document.getElementById('orb').style.opacity = '0.3';
            document.getElementById('road-light').style.opacity = '1';
            document.getElementById('final-words').classList.remove('hidden');
        }
    </script>
</body>
</html>
