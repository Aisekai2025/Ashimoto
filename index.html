<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ashimoto - あなたの資産を照らす</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #080808; overflow: hidden; font-family: 'Hiragino Mincho ProN', 'serif'; color: #d4d4d4; }
        .orb {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            width: 140px; height: 140px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,180,80,0.7) 0%, rgba(255,100,0,0) 75%);
            filter: blur(25px); transition: all 3s ease;
            animation: breathe 8s infinite ease-in-out;
        }
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.8; } }
        .particle { position: absolute; pointer-events: none; background: #ffe0aa; border-radius: 50%; }
        .road-light {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 300px; height: 400px;
            background: radial-gradient(ellipse at bottom, rgba(255,200,100,0.15) 0%, transparent 75%);
            opacity: 0; transition: opacity 4s ease;
        }
        .asset-star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.4; filter: blur(1px); }
        button { backdrop-filter: blur(10px); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation: fadeIn 3s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- 資産の可視化：蓄積された光 -->
    <div id="vault" class="fixed top-6 left-0 right-0 flex justify-center space-x-1 opacity-40 pointer-events-none"></div>

    <div id="orb" class="orb"></div>
    <div id="road-light" class="road-light"></div>

    <div id="ui-container" class="fixed inset-0 flex flex-col justify-end p-10 space-y-6 z-10">
        <div id="message" class="text-center mb-16 opacity-0 transition-opacity duration-2000 text-lg tracking-[0.2em] font-light">
            最近、どう？
        </div>

        <!-- 選択肢 -->
        <div id="actions" class="flex flex-col space-y-4 opacity-0 transition-opacity duration-1000">
            <button onclick="handleFlow(1)" class="bg-white/5 border border-white/10 py-5 rounded-full hover:bg-white/10">言葉にならない</button>
            <button onclick="handleFlow(2)" class="bg-white/5 border border-white/10 py-5 rounded-full hover:bg-white/10">普通、かな</button>
            <button onclick="handleFlow(3)" class="bg-white/5 border border-white/10 py-5 rounded-full hover:bg-white/10">少し、話したい</button>
        </div>

        <!-- 入力フォーム -->
        <div id="text-input" class="hidden flex flex-col space-y-6">
            <textarea id="user-log" class="bg-transparent border-b border-white/20 p-4 text-stone-200 focus:outline-none focus:border-amber-500/50 transition-colors resize-none h-32" placeholder="静かな場所で、心の中を置くように。"></textarea>
            <button onclick="finalize()" class="text-amber-200/70 text-sm tracking-widest hover:text-amber-200 transition">このまま、預ける</button>
        </div>

        <!-- 終了の三句 -->
        <div id="final-words" class="hidden text-center space-y-8 pb-10">
            <div class="space-y-4">
                <p class="fade-in opacity-0" style="animation-delay: 1s;">おかえりなさい</p>
                <p class="fade-in opacity-0" style="animation-delay: 2.5s;">お疲れ様</p>
                <p class="fade-in opacity-0" style="animation-delay: 4s;">またいつでも</p>
            </div>
            <!-- 再起動ボタン -->
            <button onclick="resetApp()" class="fade-in opacity-0 mt-12 text-[10px] tracking-[0.3em] text-stone-500 hover:text-stone-300 uppercase" style="animation-delay: 6s;">
                [ 深呼吸して戻る ]
            </button>
        </div>
    </div>

    <script>
        let trustCount = parseInt(localStorage.getItem('ashimoto_trust') || '0');

        function updateVault() {
            const vault = document.getElementById('vault');
            vault.innerHTML = '';
            // 資産（入力回数）に応じて星を増やす
            const stars = Math.min(trustCount, 50); 
            for(let i=0; i<stars; i++) {
                const s = document.createElement('div');
                s.className = 'asset-star';
                const size = Math.random() * 2 + 1;
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.margin = '0 2px';
                vault.appendChild(s);
            }
        }

        function createParticles(x, y, count=30) {
            for(let i=0; i<count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 3 + 0.5;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                document.body.appendChild(p);
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 150 + 30;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;

                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
                ], { duration: 2000 + Math.random() * 2000, easing: 'out-expo' });
                setTimeout(() => p.remove(), 4000);
            }
        }

        window.onload = () => {
            updateVault();
            setTimeout(() => document.getElementById('message').style.opacity = '1', 800);
            setTimeout(() => document.getElementById('actions').style.opacity = '1', 2500);
        };

        function handleFlow(type) {
            createParticles(window.innerWidth/2, window.innerHeight*0.35);
            document.getElementById('message').style.opacity = '0';
            document.getElementById('actions').classList.add('hidden');
            
            if(type === 3) {
                document.getElementById('text-input').classList.remove('hidden');
            } else {
                finalize();
            }
        }

        function finalize() {
            trustCount++;
            localStorage.setItem('ashimoto_trust', trustCount);
            createParticles(window.innerWidth/2, window.innerHeight*0.4, 50);
            
            document.getElementById('text-input').classList.add('hidden');
            document.getElementById('orb').style.transform = 'translate(-50%, -50%) scale(0.6)';
            document.getElementById('orb').style.filter = 'blur(40px)';
            document.getElementById('road-light').style.opacity = '1';
            document.getElementById('final-words').classList.remove('hidden');
            updateVault();
        }

        function resetApp() {
            location.reload();
        }
    </script>
</body>
</html>
